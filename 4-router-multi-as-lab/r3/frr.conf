frr defaults traditional
hostname r3
no ipv6 forwarding
!
interface lo
 ip address 192.168.3.1/24
!
interface eth1
 ip address 10.2.0.1/30
!
interface eth2
 ip address 10.0.13.2/30
!
router bgp 65002
 bgp router-id 3.3.3.3
 no bgp ebgp-requires-policy
 !
 ! iBGP neighbor (r4)
 neighbor 10.2.0.2 remote-as 65002
 neighbor 10.2.0.2 soft-reconfiguration inbound
 !
 ! eBGP neighbor (r1)
 neighbor 10.0.13.1 remote-as 65001
 neighbor 10.0.13.1 soft-reconfiguration inbound
 !
 address-family ipv4 unicast
  network 192.168.3.0/24
 exit-address-family
!
line vty
!
