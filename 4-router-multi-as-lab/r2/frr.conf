frr defaults traditional
hostname r2
no ipv6 forwarding
!
interface lo
 ip address 192.168.2.1/24
!
interface eth1
 ip address 10.1.0.2/30
!
interface eth2
 ip address 10.0.24.1/30
!
router bgp 65001
 bgp router-id 2.2.2.2
 no bgp ebgp-requires-policy
 !
 ! iBGP neighbor (r1)
 neighbor 10.1.0.1 remote-as 65001
 neighbor 10.1.0.1 soft-reconfiguration inbound
 !
 ! eBGP neighbor (r4)
 neighbor 10.0.24.2 remote-as 65002
 neighbor 10.0.24.2 soft-reconfiguration inbound
 neighbor 10.0.24.2 prefix-list AS65002-IN in
 !
 address-family ipv4 unicast
  network 192.168.2.0/24
 exit-address-family
!
ip prefix-list AS65002-IN seq 10 permit 192.168.3.0/24
ip prefix-list AS65002-IN seq 20 permit 192.168.4.0/24
!
line vty
!
