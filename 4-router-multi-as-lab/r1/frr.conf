frr defaults traditional
hostname r1
no ipv6 forwarding
!
interface lo
 ip address 192.168.1.1/24
!
interface eth1
 ip address 10.1.0.1/30
!
interface eth2
 ip address 10.0.13.1/30
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp ebgp-requires-policy
 !
 ! iBGP neighbor — same AS, internal link
 neighbor 10.1.0.2 remote-as 65001
 neighbor 10.1.0.2 soft-reconfiguration inbound
 !
 ! eBGP neighbor — different AS, external link
 neighbor 10.0.13.2 remote-as 65002
 neighbor 10.0.13.2 soft-reconfiguration inbound
 neighbor 10.0.13.2 prefix-list AS65002-IN in
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
 exit-address-family
!
ip prefix-list AS65002-IN seq 10 permit 192.168.3.0/24
ip prefix-list AS65002-IN seq 20 permit 192.168.4.0/24
!
line vty
!
